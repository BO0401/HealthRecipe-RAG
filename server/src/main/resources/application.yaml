spring:
  application:
    name: server

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/health_recipe_rag?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      maximum-pool-size: ${DB_POOL_MAX_ACTIVE:20}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    clean-disabled: true

server:
  port: ${SERVER_PORT:8080}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:health-recipe-jwt-secret-key-2026}
  expiration: ${JWT_EXPIRATION:86400000}

ai:
  deepseek:
    base-url: ${AI_DEEPSEEK_BASE_URL:https://api.deepseek.com}
    api-key: ${AI_DEEPSEEK_API_KEY:}
    model: ${AI_DEEPSEEK_MODEL:deepseek-chat}
