spring:
  application:
    name: server

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/health_recipe_rag?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

# 服务器端口配置
server:
  port: 8080
